version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
    groups:
      reqwest:
        patterns:
          - "reqwest"
          - "reqwest-*"
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
      http:
        patterns:
          - "http"
          - "http-*"
      ntex:
        patterns:
          - "ntex"
          - "ntex-*"
      opentelemetry:
        patterns:
          - "opentelemetry"
          - "prometheus"
          - "opentelemetry-*"
          - "opentelemetry_sdk"
          - "tracing-opentelemetry"
      tracing:
        patterns:
          - "tracing"
          - "tracing-subscriber"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "npm"
    directory: "/lib/node-addon"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 5
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    groups:
      artifacts:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
    labels:
      - "dependencies"
      - "github-actions"
      - "chore"
