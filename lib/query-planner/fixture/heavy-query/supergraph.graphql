schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @link(
  url: String
  as: String
  for: link__Purpose
  import: [link__Import]
) repeatable on SCHEMA

directive @join__field(
  graph: join__Graph
  requires: join__FieldSet
  provides: join__FieldSet
  type: String
  external: Boolean
  override: String
  usedOverridden: Boolean
) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__implements(
  graph: join__Graph!
  interface: String!
) repeatable on OBJECT | INTERFACE

directive @join__type(
  graph: join__Graph!
  key: join__FieldSet
  extension: Boolean! = false
  resolvable: Boolean! = true
  isInterfaceObject: Boolean! = false
) repeatable on OBJECT | INTERFACE

directive @join__unionMember(
  graph: join__Graph!
  member: String!
) repeatable on UNION

enum link__Purpose {
  EXECUTION
  SECURITY
}

scalar join__FieldSet
scalar link__Import

enum join__Graph {
  CATALOG @join__graph(name: "catalog", url: "http://catalog/graphql")
  PERSONALIZATION
    @join__graph(name: "personalization", url: "http://personalization/graphql")
  ARTWORK @join__graph(name: "artwork", url: "http://artwork/graphql")
  PLAYBACK @join__graph(name: "playback", url: "http://playback/graphql")
  RATINGS @join__graph(name: "ratings", url: "http://ratings/graphql")
  LOCALIZATION
    @join__graph(name: "localization", url: "http://localization/graphql")
  MERCH @join__graph(name: "merch", url: "http://merch/graphql")
}

type Query @join__type(graph: CATALOG) @join__type(graph: PERSONALIZATION) {
  home(
    profileId: ID!
    locale: String!
    device: String!
    maturity: Int!
    experiments: [String!]!
  ): Screen! @join__field(graph: CATALOG) @join__field(graph: PERSONALIZATION)
  title(id: ID!): Title @join__field(graph: CATALOG)
}

