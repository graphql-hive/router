schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @join__field(
  graph: join__Graph
  requires: join__FieldSet
  provides: join__FieldSet
  type: String
  external: Boolean
  override: String
  usedOverridden: Boolean
) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__implements(
  graph: join__Graph!
  interface: String!
) repeatable on OBJECT | INTERFACE

directive @join__type(
  graph: join__Graph!
  key: join__FieldSet
  extension: Boolean! = false
  resolvable: Boolean! = true
  isInterfaceObject: Boolean! = false
) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR

directive @join__unionMember(
  graph: join__Graph!
  member: String!
) repeatable on UNION

directive @link(
  url: String
  as: String
  for: link__Purpose
  import: [link__Import]
) repeatable on SCHEMA

scalar join__FieldSet

enum join__Graph {
  A @join__graph(name: "a", url: "")
  B @join__graph(name: "b", url: "")
}

scalar link__Import

enum link__Purpose {
  """
  `SECURITY` features provide metadata necessary to securely resolve fields.
  """
  SECURITY

  """
  `EXECUTION` features provide metadata necessary for operation execution.
  """
  EXECUTION
}

type PageInfo
  @join__type(graph: B)
  @join__type(graph: A)
{
  totalPages: Int!
  totalItems: Int!
  page: Int!
  perPage: Int!
  hasPreviousPage: Boolean!
  hasNextPage: Boolean!
}

type Product
  @join__type(graph: B, key: "id")
  @join__type(graph: A, key: "id")
{
  id: ID!
  name: String! @join__field(graph: B)
  slug: String! @join__field(graph: B)
}

type DigitalBook
  @join__type(graph: A)
{
  product: Product
}

type PaperBook
  @join__type(graph: A)
{
  product: Product
}

union OrderItem
  @join__type(graph: A)
  @join__unionMember(graph: A, member: "PaperBook")
  @join__unionMember(graph: A, member: "DigitalBook")
 = PaperBook | DigitalBook

type Order
  @join__type(graph: A, key: "id")
{
  id: ID!
  items: [OrderItem!]!
}

type OrdersPageConnections
  @join__type(graph: A)
{
  items: [Order!]!
  pageInfo: PageInfo!
}

type Error
  @join__type(graph: A)
  @join__type(graph: B)
{
  message: String!
}

union OrdersResult
  @join__type(graph: A)
  @join__unionMember(graph: A, member: "OrdersPageConnections")
  @join__unionMember(graph: A, member: "Error")
 = OrdersPageConnections | Error

type Query
  @join__type(graph: A)
{
  orders: OrdersResult! @join__field(graph: A)
}
