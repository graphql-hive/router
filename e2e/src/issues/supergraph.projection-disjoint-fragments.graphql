schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @join__field(
  graph: join__Graph
  requires: join__FieldSet
  provides: join__FieldSet
  type: String
  external: Boolean
  override: String
  usedOverridden: Boolean
) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__implements(
  graph: join__Graph!
  interface: String!
) repeatable on OBJECT | INTERFACE

directive @join__type(
  graph: join__Graph!
  key: join__FieldSet
  extension: Boolean! = false
  resolvable: Boolean! = true
  isInterfaceObject: Boolean! = false
) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR

directive @join__unionMember(
  graph: join__Graph!
  member: String!
) repeatable on UNION

directive @link(
  url: String
  as: String
  for: link__Purpose
  import: [link__Import]
) repeatable on SCHEMA

scalar join__FieldSet

enum join__Graph {
  SEARCH @join__graph(name: "search", url: "http://0.0.0.0:4200/search")
}

scalar link__Import

enum link__Purpose {
  SECURITY
  EXECUTION
}

type Query @join__type(graph: SEARCH) {
  search: [SearchResult!]! @join__field(graph: SEARCH)
}

union SearchResult
  @join__type(graph: SEARCH)
  @join__unionMember(graph: SEARCH, member: "Collection")
  @join__unionMember(graph: SEARCH, member: "CurrencyV2")
  @join__unionMember(graph: SEARCH, member: "Item") =
  | Collection
  | CurrencyV2
  | Item

type Chain @join__type(graph: SEARCH) {
  identifier: ID!
  arch: String!
}

type Collection @join__type(graph: SEARCH) {
  id: ID!
  chain: Chain!
}

type CurrencyV2 @join__type(graph: SEARCH) {
  id: ID!
  chain: Chain!
}

type Item @join__type(graph: SEARCH) {
  id: ID!
  chain: Chain!
}
