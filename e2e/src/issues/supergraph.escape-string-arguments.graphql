schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
  mutation: Mutation
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @join__field(
  graph: join__Graph
  requires: join__FieldSet
  provides: join__FieldSet
  type: String
  external: Boolean
  override: String
  usedOverridden: Boolean
) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__implements(
  graph: join__Graph!
  interface: String!
) repeatable on OBJECT | INTERFACE

directive @join__type(
  graph: join__Graph!
  key: join__FieldSet
  extension: Boolean! = false
  resolvable: Boolean! = true
  isInterfaceObject: Boolean! = false
) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR

directive @join__unionMember(
  graph: join__Graph!
  member: String!
) repeatable on UNION

directive @link(
  url: String
  as: String
  for: link__Purpose
  import: [link__Import]
) repeatable on SCHEMA

scalar join__FieldSet

enum join__Graph {
  ENTRIES @join__graph(name: "entries", url: "http://0.0.0.0:4200/entries")
}

scalar link__Import

enum link__Purpose {
  SECURITY
  EXECUTION
}

type Query @join__type(graph: ENTRIES) {
  entry(id: String!): Entry
}

type Mutation @join__type(graph: ENTRIES) {
  writeEntry(bucket: String!, attempt: Int!, entries: [EntryAction!]!): Entry
}

type Entry @join__type(graph: ENTRIES) {
  id: String!
}

input EntryAction @join__type(graph: ENTRIES) {
  upsert: UpsertEntry
}

input UpsertEntry @join__type(graph: ENTRIES) {
  schemaKey: String!
  attributes: [EntryAttribute!]!
}

input EntryAttribute @join__type(graph: ENTRIES) {
  key: String!
  payload: String!
}
