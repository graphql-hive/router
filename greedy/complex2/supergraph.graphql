schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION) {
  query: Query
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE
directive @join__field(graph: join__Graph, requires: join__FieldSet, provides: join__FieldSet, type: String, external: Boolean, override: String, usedOverridden: Boolean) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION
directive @join__graph(name: String!, url: String!) on ENUM_VALUE
directive @join__type(graph: join__Graph!, key: join__FieldSet, extension: Boolean! = false, resolvable: Boolean! = true) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR
directive @link(url: String, as: String, for: link__Purpose, import: [link__Import]) repeatable on SCHEMA

scalar join__FieldSet

enum join__Graph {
  CATALOG @join__graph(name: "catalog", url: "http://localhost:4200/catalog")
  INVENTORY @join__graph(name: "inventory", url: "http://localhost:4200/inventory")
  PRICING @join__graph(name: "pricing", url: "http://localhost:4200/pricing")
  REVIEWS @join__graph(name: "reviews", url: "http://localhost:4200/reviews")
  RECOMMENDATIONS @join__graph(name: "recommendations", url: "http://localhost:4200/recommendations")
}

scalar link__Import
enum link__Purpose { SECURITY EXECUTION }

type Query
  @join__type(graph: CATALOG)
  @join__type(graph: INVENTORY)
  @join__type(graph: PRICING)
  @join__type(graph: REVIEWS)
  @join__type(graph: RECOMMENDATIONS) {
  products: [Product!]! @join__field(graph: CATALOG) @join__field(graph: INVENTORY)
  featured: [Product!]! @join__field(graph: RECOMMENDATIONS) @join__field(graph: CATALOG)
  categories: [Category!]! @join__field(graph: CATALOG) @join__field(graph: PRICING)
}

type Product
  @join__type(graph: CATALOG, key: "id")
  @join__type(graph: INVENTORY, key: "id")
  @join__type(graph: PRICING, key: "id")
  @join__type(graph: REVIEWS, key: "id")
  @join__type(graph: RECOMMENDATIONS, key: "id") {
  id: ID!
  name: String @join__field(graph: CATALOG)
  description: String @join__field(graph: CATALOG) @join__field(graph: INVENTORY)
  sku: String @join__field(graph: INVENTORY)
  price: Float @join__field(graph: PRICING)
  currency: String @join__field(graph: PRICING) @join__field(graph: REVIEWS)
  rating: Float @join__field(graph: REVIEWS)
  reviewCount: Int @join__field(graph: REVIEWS) @join__field(graph: RECOMMENDATIONS)
  similarProducts: [Product!]! @join__field(graph: RECOMMENDATIONS)
}

type Category
  @join__type(graph: CATALOG, key: "id")
  @join__type(graph: PRICING, key: "id") {
  id: ID!
  name: String @join__field(graph: CATALOG)
  discount: Float @join__field(graph: PRICING)
}
